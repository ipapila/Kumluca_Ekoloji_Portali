<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumluca Çevre İzleme</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#1a1e26;color:#eee;}
header{background:#2c3e2f;padding:15px;text-align:center;}
.container{display:flex;flex-wrap:wrap;gap:20px;padding:20px;}
.form-panel{flex:1;min-width:260px;background:#0f1219;padding:20px;border-radius:12px;}
.map-panel{flex:2;min-width:300px;}
#map{height:500px;border-radius:12px;}
input,select,textarea,button{width:100%;margin:8px 0;padding:10px;border-radius:8px;border:none;}
button{background:#e8a020;color:#000;font-weight:bold;cursor:pointer;}
button:hover{background:#d48f1a;}
label{font-weight:bold;display:block;margin-top:6px;}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin:15px 0;}
.fchip{padding:4px 12px;border-radius:20px;background:#2a2e3c;cursor:pointer;font-size:12px;}
.fchip.active{background:#e8a020;color:#000;}
#list{background:#0f1219;border-radius:12px;padding:12px;margin-top:15px;max-height:300px;overflow-y:auto;}
.item{padding:10px;border-bottom:1px solid #2a2e3c;cursor:pointer;}
.item:hover{background:#1e222d;}
.leaflet-popup-content-wrapper{background:#0f1219;color:#eee;border-radius:8px;}
.leaflet-popup-tip{background:#0f1219;}
</style>
</head>
<body>
<header><h1>🌿 Kumluca Çevre İzleme</h1></header>
<div class="container">
  <div class="form-panel">
    <h3>Yeni İhbar Ekle</h3>
    <div class="filters" id="filterWrap"></div>
    <label>📂 Kategori</label>
    <select id="kategori">
      <option value="cop">Çöp / Evsel Atık</option><option value="sera">Sera Atığı</option>
      <option value="su">Kirlenmiş Su</option><option value="kimyasal">Kimyasal Atık</option>
      <option value="kacak">Kaçak Döküm</option><option value="yangin">Yangın Riski</option>
    </select>
    <label>📝 Açıklama</label><textarea id="aciklama" rows="3"></textarea>
    <label>📅 Tarih</label><input type="date" id="tarih">
    <label>📍 Mevki</label><input id="mevki" placeholder="Mahalle, yol adı...">
    <label>📸 Fotoğraf (URL veya dosya)</label>
    <input type="url" id="photoUrl" placeholder="https://...">
    <input type="file" id="photoFile" accept="image/*">
    <img id="preview" style="max-width:100%;margin-top:5px;display:none;">
    <label>👤 Raporlayan</label><input id="raporlayan">
    <label>⚡ Şiddet (1-5)</label><select id="siddet"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select>
    <button id="kaydetBtn">🔒 Kaydet (Admin)</button>
    <div id="list"><h4>📋 Aktif Sorunlar</h4><div id="incidentList"></div></div>
  </div>
  <div class="map-panel"><div id="map"></div></div>
</div>

<script>
// Tüm kategoriler
const CATEGORIES = [
  {id:"cop",label:"Çöp / Evsel Atık",icon:"🗑️",color:"#e05535"},
  {id:"sera",label:"Sera Atığı",icon:"🏚️",color:"#55bb65"},
  {id:"su",label:"Kirlenmiş Su",icon:"💧",color:"#2d80e0"},
  {id:"kimyasal",label:"Kimyasal Atık",icon:"☣️",color:"#b828c0"},
  {id:"kacak",label:"Kaçak Döküm",icon:"🚮",color:"#c03040"},
  {id:"yangin",label:"Yangın Riski",icon:"🔥",color:"#e86010"}
];
let data = [];
let markers = {};
let activeFilters = new Set(CATEGORIES.map(c=>c.id));
let addMode = false;
let pendingLatLng = null;
let isAdmin = false;
let photoBase64 = null;

// Admin girişi
let adminPass = "1234";
let loggedIn = false;
function promptLogin() {
  let pwd = prompt("Admin şifresi:");
  if(pwd === adminPass) { isAdmin = true; alert("Admin girişi yapıldı."); document.getElementById("kaydetBtn").innerHTML = "💾 Kaydet"; }
  else alert("Şifre hatalı");
}
document.getElementById("kaydetBtn").onclick = () => { if(!isAdmin) promptLogin(); else saveReport(); };

// Harita
const map = L.map('map').setView([36.368, 30.290], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB', subdomains: 'abcd' }).addTo(map);
map.on('click', e => { if(addMode) { pendingLatLng = e.latlng; addMode=false; document.body.style.cursor='default'; alert("Konum alındı, formu doldurun."); } });

function enableAddMode() { addMode = true; document.body.style.cursor = 'crosshair'; alert("Haritaya tıklayarak konum seçin."); }

// Veri çekme
async function fetchData() {
  const res = await fetch('/data');
  data = await res.json();
  renderMarkers();
  renderList();
}
// Kaydetme
async function saveReport() {
  if(!pendingLatLng && !document.getElementById("kategori").value) { alert("Önce haritaya tıklayarak konum seçin."); enableAddMode(); return; }
  const kategori = document.getElementById("kategori").value;
  const aciklama = document.getElementById("aciklama").value.trim();
  if(!aciklama) { alert("Açıklama girin"); return; }
  const photo = photoBase64 || document.getElementById("photoUrl").value.trim();
  const payload = {
    password: adminPass,
    kategori, aciklama,
    lat: pendingLatLng.lat, lng: pendingLatLng.lng,
    date: document.getElementById("tarih").value || new Date().toISOString().split('T')[0],
    location: document.getElementById("mevki").value,
    reporter: document.getElementById("raporlayan").value,
    severity: document.getElementById("siddet").value,
    photo: photo
  };
  const res = await fetch('/data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if(res.ok) { alert("Kaydedildi!"); fetchData(); pendingLatLng = null; document.getElementById("aciklama").value = ""; document.getElementById("mevki").value = ""; document.getElementById("raporlayan").value = ""; document.getElementById("photoUrl").value = ""; document.getElementById("photoFile").value = ""; photoBase64 = null; document.getElementById("preview").style.display = 'none'; }
  else alert("Hata: "+res.status);
}
// Marker işlemleri
function makeIcon(catId) {
  let cat = CATEGORIES.find(c=>c.id===catId);
  if(!cat) cat = CATEGORIES[0];
  const sz = 34;
  const svg = `<svg width="${sz}" height="${sz+10}" viewBox="0 0 ${sz} ${sz+10}"><path d="M${sz/2} 2 C${sz*.18} 2,2 ${sz*.3},2 ${sz*.52} C2 ${sz*.82},${sz/2} ${sz+8},${sz/2} ${sz+8} C${sz/2} ${sz+8},${sz-2} ${sz*.82},${sz-2} ${sz*.52} C${sz-2} ${sz*.3},${sz*.82} 2,${sz/2} 2Z" fill="${cat.color}"/><text x="${sz/2}" y="${sz*.5}" text-anchor="middle" font-size="${sz*.44}" fill="white">${cat.icon}</text></svg>`;
  return L.divIcon({html:svg, iconSize:[sz,sz+10], iconAnchor:[sz/2,sz+10]});
}
function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  data.forEach(inc => {
    if(!inc.active) return;
    if(!activeFilters.has(inc.category)) return;
    const m = L.marker([inc.lat, inc.lng], { icon: makeIcon(inc.category) }).addTo(map);
    m.bindPopup(`<b>${inc.category}</b><br>${inc.description}<br><img src="${inc.photo || ''}" width="200" onerror="this.style.display='none'">`);
    markers[inc.id] = m;
  });
}
function renderList() {
  const container = document.getElementById("incidentList");
  const filtered = data.filter(i => i.active && activeFilters.has(i.category));
  if(filtered.length===0) { container.innerHTML = "<div>Hiç aktif sorun yok</div>"; return; }
  container.innerHTML = "";
  filtered.forEach(inc => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<b>${inc.category}</b> - ${inc.description}<br><small>${inc.date} ${inc.location||''}</small>`;
    div.onclick = () => { map.setView([inc.lat, inc.lng], 15); markers[inc.id]?.openPopup(); };
    container.appendChild(div);
  });
}
// Filtreler
function initFilters() {
  const wrap = document.getElementById("filterWrap");
  CATEGORIES.forEach(cat => {
    const chip = document.createElement("div");
    chip.className = "fchip active";
    chip.innerText = `${cat.icon} ${cat.label}`;
    chip.onclick = () => {
      if(activeFilters.has(cat.id)) activeFilters.delete(cat.id);
      else activeFilters.add(cat.id);
      chip.classList.toggle("active", activeFilters.has(cat.id));
      renderMarkers();
      renderList();
    };
    wrap.appendChild(chip);
  });
}
// Fotoğraf dosya işleme
document.getElementById("photoFile").onchange = e => {
  const f = e.target.files[0];
  if(f) {
    const reader = new FileReader();
    reader.onload = ev => { photoBase64 = ev.target.result; document.getElementById("preview").src = photoBase64; document.getElementById("preview").style.display = "block"; };
    reader.readAsDataURL(f);
  }
};
// Başlangıç
fetchData();
initFilters();
document.getElementById("tarih").value = new Date().toISOString().split('T')[0];
// Buton ekle: konum seçme butonu
let addBtn = document.createElement("button");
addBtn.innerText = "📍 Haritadan Konum Seç";
addBtn.onclick = enableAddMode;
document.querySelector(".form-panel").insertBefore(addBtn, document.getElementById("kaydetBtn"));
</script>
</body>
</html>
