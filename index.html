<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// Firebase yok, tüm işlemler fetch ile /data endpoint'ine
let data = [];
let mkrs = {};
let addMode = false;
let pendLL = null;
let editId = null;
let viewMode = 'active';
let activeF = new Set(); // doldurulacak
let isAdmin = false;
let photoBase64 = null;
let photoTabMode = 'url';
let editLocationMode = false;
let editPendLL = null;
let qrObj = null;
let activeOV = new Set(['sinir']);

const CATS = [ /* aynı kategori listesi */ ];
const CMAP = {};
CATS.forEach(c => CMAP[c.id] = c);
const RBYMAP = { /* aynı */ };

// ADMIN şifresi (client-side sadece UI içindir, asıl güvenlik sunucuda)
let ADMIN_PASS = "1234";

// ------------------- SERVER İLETİŞİMİ -------------------
async function fetchData() {
  const res = await fetch("/data");
  data = await res.json();
  renderMkrs();
  renderList();
  if (viewMode === 'resolved') renderResolvedSidebar();
  updateStats();
}

async function sendPost(entry) {
  const res = await fetch("/data", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: ADMIN_PASS, ...entry })
  });
  if (!res.ok) throw new Error(await res.text());
  await fetchData();
}

async function sendPut(id, updates) {
  const res = await fetch(`/data/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: ADMIN_PASS, updates })
  });
  if (!res.ok) throw new Error(await res.text());
  await fetchData();
}

async function sendDelete(id) {
  const res = await fetch(`/data/${id}`, {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: ADMIN_PASS })
  });
  if (!res.ok) throw new Error(await res.text());
  await fetchData();
}

// ------------------- HARİTA, MARKER, POPUP (AYNI, sadece veri kaynağı data değişkeni) -------------------
// ... (bu kısımlar orijinal HTML'dekiyle neredeyse birebir aynı, sadece fbEnabled kontrolü kalktı)
// Aşağıda tam dosyada vereceğim için uzatmıyorum.

// ------------------- FORM KAYDET (değiştirildi) -------------------
async function saveInc() {
  if (!isAdmin) return;
  const cat = document.getElementById("fcat").value;
  const desc = document.getElementById("fdesc").value.trim();
  const date = document.getElementById("fdate").value;
  const loc = document.getElementById("floc").value.trim();
  const photo = photoTabMode === 'url' ? document.getElementById("fphoto").value.trim() : (photoBase64 || "");
  const reporter = document.getElementById("freporter").value.trim();
  const sev = document.getElementById("fsev").value;
  if (!desc) { document.getElementById("fdesc").focus(); return; }

  const saveBtn = document.getElementById("save-btn");
  saveBtn.disabled = true;
  saveBtn.textContent = "⏳ Kaydediliyor…";
  try {
    if (editId) {
      const updates = {
        category: cat, description: desc, date, location: loc, photo, reporter, severity: sev
      };
      if (editPendLL) { updates.lat = editPendLL.lat; updates.lng = editPendLL.lng; }
      await sendPut(editId, updates);
    } else {
      if (!pendLL) throw new Error("Konum seçilmemiş");
      await sendPost({
        kategori: cat, aciklama: desc, lat: pendLL.lat, lng: pendLL.lng,
        date, location: loc, photo, reporter, severity: sev
      });
    }
    closeOv("form-ov");
    pendLL = null; editPendLL = null;
    if (addMode) toggleAdd();
  } catch (e) { alert("Kayıt hatası: " + e.message); }
  finally { saveBtn.disabled = false; saveBtn.innerHTML = "💾 Kaydet"; }
}

// ------------------- DİĞER FONKSİYONLAR (delInc, doResolve, reactivate vs.) hepsi sendDelete/sendPut kullanacak -------------------
async function delInc(id) {
  if (!isAdmin) return;
  if (!confirm("Kalıcı olarak sil?")) return;
  await sendDelete(id);
  map.closePopup();
}

async function doResolve() {
  const id = document.getElementById("resolve-id").value;
  const rdate = document.getElementById("rdate").value;
  const rby = document.getElementById("rby").value;
  const rnote = document.getElementById("rnote").value.trim();
  const rphoto = document.getElementById("rphoto-url").value.trim();
  await sendPut(id, {
    active: false, resolutionDate: rdate, resolvedBy: rby,
    resolvedNote: rnote, resolvedPhoto: rphoto, resolvedAt: new Date().toISOString()
  });
  closeOv("resolve-ov");
}

async function reactivate(id) {
  if (!isAdmin) return;
  await sendPut(id, {
    active: true, resolvedBy: "", resolvedNote: "", resolvedPhoto: "", resolvedAt: "", resolutionDate: ""
  });
  closeOv("resolved-list-ov");
  map.closePopup();
}

async function clearAll() {
  if (!isAdmin) return;
  if (!confirm("TÜM kayıtlar silinecek. Onaylıyor musunuz?")) return;
  const res = await fetch("/data", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: ADMIN_PASS })
  });
  if (res.ok) await fetchData();
  else alert("Silme başarısız");
  closeOv("admin-ov");
}

// ------------------- BAŞLANGIÇ -------------------
function init() {
  // Kategorileri doldur
  initChips(); initCatSel(); initPhotoDrop();
  rebuildLeafletLayers(); renderLayerBtns();
  // Verileri yükle
  fetchData().catch(e => console.error(e));
  // Olay dinleyicileri
  document.querySelectorAll('.ov').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });
  // Admin butonları
  document.getElementById("login-btn").onclick = openLogin;
  document.getElementById("add-btn").onclick = () => toggleAdd();
  document.getElementById("active-btn").onclick = () => setViewMode('active');
  document.getElementById("resolved-btn").onclick = () => setViewMode('resolved');
  // ... diğer bağlantılar (önceki kodla aynı)
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
