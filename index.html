<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumluca Çevre İzleme</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<h1>Kumluca Çevre İzleme</h1>

<div id="form">
  <label>Kategori:</label>
  <select id="kategori">
    <option>Sera Atığı</option>
    <option>Kaçak Döküm</option>
    <option>Kirlenmiş Su</option>
  </select><br>

  <label>Açıklama:</label>
  <input type="text" id="aciklama"><br>

  <label>Koordinat (lat,lng):</label>
  <input type="number" id="lat" placeholder="Enlem" step="0.000001">
  <input type="number" id="lng" placeholder="Boylam" step="0.000001"><br>

  <label>Fotoğraf Yükle:</label>
  <input type="file" id="photoInput" accept="image/*"><br>

  <button onclick="submitData()">Kaydet</button>
</div>

<div id="map" style="height:600px;margin-top:20px;"></div>

<script src="script.js"></script>
</body>
</html>
